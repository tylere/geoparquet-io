name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Help us understand your use case.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? What's your use case?
      placeholder: "I'm trying to [use case], but gpio doesn't support..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? What should the CLI/API look like?
      placeholder: |
        CLI: `gpio add custom-index input.parquet output.parquet --method xyz`
        Python: `table.add_custom_index(method='xyz')`
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered or current workarounds
      placeholder: "Currently I'm using [workaround], but it's slow/cumbersome because..."

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to your workflow?
      options:
        - "Nice to have"
        - "Important"
        - "Critical blocker"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
        - label: I can help test this feature
